apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  namespace: healthbox-api
data:
  SERVER_PORT: "3000"
  MONGODB_DB: "healthappdb"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-api
  namespace: healthbox-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: node-api
  template:
    metadata:
      labels:
        app: node-api
    spec:
      # Optional: wait for Mongo before starting
      initContainers:
        - name: wait-for-mongo
          image: busybox:1.36
          command: ['sh', '-c']
          args:
            - |
              echo "Waiting for mongo at mongo.healthbox-api.svc.cluster.local:27017 ..."
              until nc -z mongo.healthbox-api.svc.cluster.local 27017; do
                echo "Mongo not up yet, sleeping 2s"; sleep 2;
              done
              echo "Mongo is up."
      imagePullSecrets:
        - name: dockerhub-cred
      containers:
        - name: node-api
          image: ashutoshpandey/healthbox-api:dev1.4
          ports:
            - containerPort: 3000
              name: http
          env:
            # non-sensitive config from ConfigMap
            - name: SERVER_PORT
              valueFrom:
                configMapKeyRef:
                  name: api-config
                  key: SERVER_PORT
            - name: MONGODB_DB
              valueFrom:
                configMapKeyRef:
                  name: api-config
                  key: MONGODB_DB

            # sensitive creds from mongo-auth Secret
            - name: MONGO_USER
              valueFrom:
                secretKeyRef:
                  name: mongo-auth
                  key: MONGO_INITDB_ROOT_USERNAME
            - name: MONGO_PASS
              valueFrom:
                secretKeyRef:
                  name: mongo-auth
                  key: MONGO_INITDB_ROOT_PASSWORD

            # assemble the final URI (K8s expands $(VAR) here)
            - name: DB_CONNECTION
              value: "mongodb://$(MONGO_USER):$(MONGO_PASS)@mongo.healthbox-api.svc.cluster.local:27017/$(MONGODB_DB)?authSource=admin"

          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 30
            periodSeconds: 10
          startupProbe:
            httpGet: { path: /health, port: http }
            failureThreshold: 30
            periodSeconds: 2
---
apiVersion: v1
kind: Service
metadata:
  name: node-api
  namespace: healthbox-api
spec:
  type: ClusterIP
  selector:
    app: node-api
  ports:
    - name: http
      port: 80
      targetPort: 3000
