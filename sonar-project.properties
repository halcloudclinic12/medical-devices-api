# --- Required ---
sonar.projectKey=Healthbox-API
sonar.projectName=Healthbox API
sonar.sources=src
sonar.exclusions=**/node_modules/**,**/dist/**

# --- Optional but useful ---
# If using Node features not in PATH, set absolute path:
# sonar.nodejs.executable=/usr/bin/node

# Test & coverage (example: Jest + ts-jest)
# Generate coverage/lcov.info via Jest (see step 4)
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# If you export a test-results file (e.g., jest-junit)
# sonar.testExecutionReportPaths=reports/jest-junit.xml
